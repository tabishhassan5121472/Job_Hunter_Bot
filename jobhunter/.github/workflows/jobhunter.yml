name: JobHunter

on:
  schedule:
    - cron: "0 */5 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

defaults:
  run:
    working-directory: jobhunter

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Run JobHunter
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python main.py

      - name: Commit jobs.db and reports
        working-directory: .
        run: |
          git config user.name jobhunter-bot
          git config user.email bot@users.noreply.github.com
          git add jobhunter/jobs.db jobhunter/reports/ || true
          git diff --staged --quiet && exit 0
          git commit -m "jh run"
          git push || true
