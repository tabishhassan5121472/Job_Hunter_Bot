name: JobHunter

  on:
    schedule:
      - cron: "0 */5 * * *"
    workflow_dispatch: {}

  permissions:
    contents: write

  concurrency:
    group: jobhunter
    cancel-in-progress: false

  jobs:
    run:
      runs-on: ubuntu-latest
      timeout-minutes: 25
      steps:
        - uses: actions/checkout@v4
          with:
            token: ${{ secrets.GITHUB_TOKEN }}
            persist-credentials: true

        - uses: actions/setup-python@v5
          with:
            python-version: "3.11"
            cache: pip

        - name: Install deps
          run: |
            python -m pip install --upgrade pip
            pip install -r requirements.txt

        - name: Run JobHunter
          env:
            NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
            NTFY_SERVER: ${{ secrets.NTFY_SERVER }}
            ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
            CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
            CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
          run: python main.py

        - name: Commit jobs.db + reports back to repo
          run: |
            set -e
            git config user.name  "jobhunter-bot"
            git config user.email "jobhunter-bot@users.noreply.github.com"
            git add jobs.db reports/ 2>/dev/null || true
            if git diff --staged --quiet; then
              echo "Nothing to commit."
            else
              git commit -m "chore(jobhunter): scheduled run $(date -u +%Y-%m-%dT%H:%MZ)"
              git push
            fi
