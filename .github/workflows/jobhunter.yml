name: JobHunter

  on:
    schedule:
      - cron: "0 */5 * * *"
    workflow_dispatch: {}

  permissions:
    contents: write

  jobs:
    run:
      runs-on: ubuntu-latest
      timeout-minutes: 25
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-python@v5
          with:
            python-version: "3.11"
        - run: pip install -r requirements.txt
        - env:
            NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
            ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          run: python main.py
        - run: |
            git config user.name jobhunter-bot
            git config user.email jobhunter-bot@users.noreply.github.com
            git add jobs.db reports/ 2>/dev/null || true
            git diff --staged --quiet || (git commit -m "jh: $(date -u +%FT%TZ)" && git push)
